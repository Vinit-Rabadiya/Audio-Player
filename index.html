<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player</title>
  </head>
  <body>
    <style>
      body {
        background: #f4f6fb;
        font-family: "Segoe UI", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      #audioPlayer {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 32px 28px 24px 28px;
        min-width: 320px;
        max-width: 350px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .display {
        margin-bottom: 18px;
        font-size: 1.2em;
        color: #333;
        font-weight: 500;
      }
      .controls {
        display: flex;
        gap: 18px;
        margin-bottom: 18px;
      }
      .controls button {
        background: #4f8cff;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 22px;
        font-size: 1em;
        cursor: pointer;
        transition: background 0.2s;
      }
      .controls button:hover {
        background: #2563eb;
      }
      .volume {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
      .volume label {
        font-size: 1em;
        color: #555;
      }
      #volumeSlider {
        flex: 1;
        accent-color: #4f8cff;
        height: 4px;
      }
      audio {
        width: 100%;
        margin-bottom: 10px;
        outline: none;
      }
    </style>

    <div id="audioPlayer">
      <audio id="audio" src="audio.mp3"></audio>

      <div class="display">
        <span id="timeDisplay">0:00</span>
      </div>
      <div class="controls">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
      </div>
      <div class="volume">
        <label for="volumeSlider">Volume</label>
        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>
      <p class="keyboard-shortcut">Press <b>Space</b> to Play/Pause</p>
    </div>
    <script src="audio.js"></script>
  </body>
</html>
